name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - 'agent/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VUE_APP_FIREBASE_API_KEY: ci-placeholder
          VUE_APP_FIREBASE_AUTH_DOMAIN: ci.example.invalid
          VUE_APP_FIREBASE_PROJECT_ID: ci-project
          VUE_APP_FIREBASE_STORAGE_BUCKET: ci.example.invalid
          VUE_APP_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          VUE_APP_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000000000'
